[package]
edition = "2021"
rust-version = "1.77.2"
name = "tauri-plugin-pdf-render"
version = "0.1.0"
authors = ["Daniele Rolli"]
description = "A Tauri plugin that renders a Tauri command's HTML through a native WebView and saves the resulting PDF + keep-blocks JSON to a path on disk."
license = "MIT"
links = "tauri-plugin-pdf-render"
exclude = ["/examples", "/dist-js", "/guest-js", "/node_modules"]

[lib]
name = "tauri_plugin_pdf_render"
path = "src/lib.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tauri = "2"
thiserror = "2"

[build-dependencies]
tauri-plugin = { version = "2", features = ["build"] }
