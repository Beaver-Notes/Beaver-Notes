name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '22'

jobs:
  validate:
    name: Validate versions
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag_name: ${{ steps.tag.outputs.tag_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Node Setup
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable Corepack
        shell: bash
        run: |
          corepack enable
          corepack prepare yarn@stable --activate

      # package.json is the source of truth for the release version.
      - name: Read version from package.json
        id: version
        shell: bash
        run: |
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      # If this is a tag push, use that tag. Otherwise build one from package.json.
      - name: Determine release tag
        id: tag
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "tag_name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag_name=v${{ steps.version.outputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      # Fail if package.json, tauri.conf.json, and Cargo.toml disagree.
      # Also fail if a pre-release version (beta) is accidentally pushed as stable.
      - name: Fail on version drift
        shell: bash
        run: |
          set -euo pipefail

          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAURI_VERSION="$(node -e "console.log(JSON.parse(require('fs').readFileSync('./src-tauri/tauri.conf.json', 'utf8')).version)")"
          CARGO_VERSION="$(node - <<'NODE'
          const fs = require('fs');
          const txt = fs.readFileSync('./src-tauri/Cargo.toml', 'utf8');
          const m = txt.match(/^\s*version\s*=\s*"(.*?)"/m);
          console.log(m ? m[1] : '');
          NODE
          )"

          echo "package.json: $PKG_VERSION"
          echo "tauri.conf.json: $TAURI_VERSION"
          echo "Cargo.toml: $CARGO_VERSION"

          # Stable releases must not carry a pre-release suffix.
          if [[ "$PKG_VERSION" == *"-"* ]]; then
            echo "ERROR: package.json version '$PKG_VERSION' looks like a pre-release."
            echo "Use the beta workflow for pre-release builds."
            exit 1
          fi

          test "$PKG_VERSION" = "$TAURI_VERSION"
          test "$PKG_VERSION" = "$CARGO_VERSION"

  desktop:
    name: Build ${{ matrix.id }}
    needs: validate
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # Universal mac build
          - id: macos-universal
            runner: macos-latest
            rust_targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
            tauri_target: 'universal-apple-darwin'
            bundle_args: '--bundles app,dmg'
            asset_suffix: 'macos-universal'

          # Linux x64 bundles: AppImage, deb, rpm and tarball
          - id: linux-x64
            runner: ubuntu-24.04
            rust_targets: 'x86_64-unknown-linux-gnu'
            tauri_target: 'x86_64-unknown-linux-gnu'
            bundle_args: '--bundles appimage,deb,rpm'
            asset_suffix: 'linux-x64'

          # Linux ARM64 bundles
          - id: linux-arm64
            runner: ubuntu-24.04-arm
            rust_targets: 'aarch64-unknown-linux-gnu'
            tauri_target: 'aarch64-unknown-linux-gnu'
            bundle_args: '--bundles appimage,deb,rpm'
            asset_suffix: 'linux-arm64'

          # Windows is build
          - id: windows-x64
            runner: windows-latest
            rust_targets: 'x86_64-pc-windows-msvc'
            tauri_target: 'x86_64-pc-windows-msvc'
            bundle_args: '--bundles nsis'
            asset_suffix: 'windows-x64'

          # ARM64 Windows build
          - id: windows-arm64
            runner: windows-11-arm
            rust_targets: 'aarch64-pc-windows-msvc'
            tauri_target: 'aarch64-pc-windows-msvc'
            bundle_args: '--bundles nsis'
            asset_suffix: 'windows-arm64'

    steps:
      # Pull source
      - name: Checkout
        uses: actions/checkout@v4

      # Use cache on GitHub runners, skipped in local ACT runs
      - name: Setup Node with Yarn cache
        if: ${{ !env.ACT }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn

      - name: Setup Node without cache
        if: ${{ env.ACT }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Use same yarn version everywhere
      - name: Enable Corepack
        shell: bash
        run: |
          corepack enable
          corepack prepare yarn@stable --activate
          yarn --version

      # Install the Rust targets needed for each matrix job
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      # Rust artifacts cache
      - name: Rust cache
        if: ${{ !env.ACT }}
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      # Install Linux deps
      - name: Install Linux dependencies
        if: ${{ startsWith(matrix.id, 'linux-') }}
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            xdg-utils \
            gnupg

      # Install JS deps
      - name: Install JS dependencies
        shell: bash
        run: |
          yarn install --frozen-lockfile

      # Linux AppImage signing
      - name: Import Linux GPG key
        if: ${{ startsWith(matrix.id, 'linux-') }}
        shell: bash
        run: |
          set -euo pipefail
          printf '%s' "${{ secrets.LINUX_GPG_PRIVATE_KEY }}" | gpg --batch --import
          gpg --list-secret-keys --keyid-format LONG

      # macOS signing and notarization
      - name: Build macOS bundles
        if: ${{ matrix.id == 'macos-universal' }}
        shell: bash
        env:
          CI: 'true'
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_SIGNING_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_SIGNING_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          yarn tauri build \
            --target "${{ matrix.tauri_target }}" \
            ${{ matrix.bundle_args }} \
            --ci

      # Linux gets updater signing, AppImage signing, and RPM signing
      # deb is still built, but not package-signing
      - name: Build Linux bundles
        if: ${{ startsWith(matrix.id, 'linux-') }}
        shell: bash
        env:
          CI: 'true'
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          SIGN: '1'
          SIGN_KEY: ${{ secrets.LINUX_GPG_KEY_ID }}
          APPIMAGETOOL_SIGN_PASSPHRASE: ${{ secrets.LINUX_GPG_PASSPHRASE }}
          APPIMAGETOOL_FORCE_SIGN: '1'
          TAURI_SIGNING_RPM_KEY: ${{ secrets.TAURI_SIGNING_RPM_KEY }}
          TAURI_SIGNING_RPM_KEY_PASSPHRASE: ${{ secrets.TAURI_SIGNING_RPM_KEY_PASSPHRASE }}
        run: |
          yarn tauri build \
            --target "${{ matrix.tauri_target }}" \
            ${{ matrix.bundle_args }} \
            --ci

      # Windows build singing TBA
      - name: Build Windows bundles
        if: ${{ startsWith(matrix.id, 'windows-') }}
        shell: bash
        env:
          CI: 'true'
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          yarn tauri build \
            --target "${{ matrix.tauri_target }}" \
            ${{ matrix.bundle_args }} \
            --ci \
            --no-sign

      # macOS release assets: DMG plus updater files
      - name: Stage macOS assets
        if: ${{ matrix.id == 'macos-universal' }}
        shell: bash
        run: |
          set -euo pipefail

          TARGET="${{ matrix.tauri_target }}"
          OUT="release-assets"
          mkdir -p "$OUT"

          find "src-tauri/target/${TARGET}/release/bundle" -type f \
            \( -name "*.dmg" -o -name "*.app.tar.gz" -o -name "*.sig" -o -name "latest.json" \) \
            -exec cp {} "$OUT"/ \;

      # Linux release assets: native packages plus a simple portable tarball
      - name: Stage Linux assets
        if: ${{ startsWith(matrix.id, 'linux-') }}
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ needs.validate.outputs.version }}"
          TARGET="${{ matrix.tauri_target }}"
          OUT="release-assets"
          BIN_NAME="beaver-notes"
          BIN_PATH="src-tauri/target/${TARGET}/release/${BIN_NAME}"
          TAR_NAME="Beaver Notes-${VERSION}-${{ matrix.asset_suffix }}.tar.gz"

          mkdir -p "$OUT"

          find "src-tauri/target/${TARGET}/release/bundle" -type f \
            \( -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" -o -name "*.sig" -o -name "latest.json" \) \
            -exec cp {} "$OUT"/ \;

          mkdir -p portable-root
          cp "$BIN_PATH" portable-root/
          tar -czf "$OUT/$TAR_NAME" -C portable-root .

      # Windows release assets: installer artifacts plus a portable zip
      - name: Stage Windows assets
        if: ${{ startsWith(matrix.id, 'windows-') }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $Version = "${{ needs.validate.outputs.version }}"
          $Target = "${{ matrix.tauri_target }}"
          $OutDir = "release-assets"
          New-Item -ItemType Directory -Force -Path $OutDir | Out-Null

          Get-ChildItem "src-tauri/target/$Target/release/bundle" -Recurse -File |
            Where-Object { $_.Extension -in ".exe", ".msi", ".sig", ".json", ".zip" } |
            ForEach-Object { Copy-Item $_.FullName -Destination $OutDir -Force }

          $Binary = "src-tauri/target/$Target/release/beaver-notes.exe"
          $PortableName = "Beaver Notes-$Version-portable-${{ matrix.asset_suffix }}.zip"
          Compress-Archive -Path $Binary -DestinationPath (Join-Path $OutDir $PortableName) -Force

      # Ship each platform's files to the publish job
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.id }}
          path: release-assets/*
          if-no-files-found: error

  publish:
    name: Publish draft release
    needs:
      - validate
      - desktop
    runs-on: ubuntu-latest

    steps:
      # Gather all artifacts from every build job
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts
          merge-multiple: true

      # Helpful when checking exactly what made it into the draft release
      - name: Inspect downloaded artifacts
        shell: bash
        run: |
          set -euo pipefail
          ls -R dist-artifacts

      # Create or update the GitHub draft release with everything attached
      - name: Create or update draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate.outputs.tag_name }}
          name: Beaver Notes ${{ needs.validate.outputs.version }}
          draft: true
          prerelease: false
          files: dist-artifacts/*
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.CUSTOM_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
