name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '22'

jobs:
  validate:
    name: Validate versions
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag_name: ${{ steps.tag.outputs.tag_name }}
      version_match: ${{ steps.jurisdiction.outputs.version_match }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Node Setup
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable Corepack
        shell: bash
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate

      # package.json is the source of truth for the release version.
      - name: Read version from package.json
        id: version
        shell: bash
        run: |
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      # If this is a tag push, use that tag. Otherwise build one from package.json.
      - name: Determine release tag
        id: tag
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "tag_name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag_name=v${{ steps.version.outputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      # Fail if package.json, tauri.conf.json, and Cargo.toml disagree.
      # Also fail if a pre-release version (beta) is accidentally pushed as stable.
      - name: Fail on version drift
        shell: bash
        run: |
          set -euo pipefail

          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAURI_VERSION="$(node -e "console.log(JSON.parse(require('fs').readFileSync('./src-tauri/tauri.conf.json', 'utf8')).version)")"
          CARGO_VERSION="$(node - <<'NODE'
          const fs = require('fs');
          const txt = fs.readFileSync('./src-tauri/Cargo.toml', 'utf8');
          const m = txt.match(/^\s*version\s*=\s*"(.*?)"/m);
          console.log(m ? m[1] : '');
          NODE
          )"

          echo "package.json: $PKG_VERSION"
          echo "tauri.conf.json: $TAURI_VERSION"
          echo "Cargo.toml: $CARGO_VERSION"

          test "$PKG_VERSION" = "$TAURI_VERSION"
          test "$PKG_VERSION" = "$CARGO_VERSION"

      - name: Check jurisdiction
        id: jurisdiction
        shell: bash
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [[ "$PKG_VERSION" == *"-"* ]]; then
            echo "version_match=false" >> "$GITHUB_OUTPUT"
            echo "Skipping — this is a pre-release version, use the beta workflow."
          else
            echo "version_match=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        shell: bash
        run: |
          yarn install --frozen-lockfile

      - name: Run lint
        shell: bash
        run: |
          yarn lint

      - name: Run typecheck
        shell: bash
        run: |
          yarn typecheck

      - name: Run unit tests
        shell: bash
        run: yarn test

      - name: Install Linux dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libasound2-dev \
            libfreetype-dev \
            libfontconfig-dev \
            patchelf \
            xdg-utils \
            gnupg

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --locked

      - name: Audit npm dependencies
        shell: bash
        run: |
          yarn audit --audit-level=high

      - name: Run knip (dead code detection)
        shell: bash
        run: |
          yarn knip --no-progress

      # Rust audit — catches RUSTSEC advisories
      - name: Install cargo-audit
        shell: bash
        run: |
          if ! command -v cargo-audit &>/dev/null; then
            cargo install cargo-audit
          fi

      - name: Audit Rust dependencies
        shell: bash
        run: |
          cd src-tauri && cargo audit

  create-release:
    name: Create draft release
    if: ${{ needs.validate.outputs.version_match == 'true' }}
    needs: validate
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.id }}

    steps:
      - name: Create empty draft release
        id: create
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate.outputs.tag_name }}
          name: Beaver Notes ${{ needs.validate.outputs.version }}
          draft: true
          prerelease: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.CUSTOM_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}

  desktop:
    name: Build ${{ matrix.id }}
    if: ${{ needs.validate.outputs.version_match == 'true' }}
    needs:
      - validate
      - create-release
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # Universal mac build
          - id: macos-universal
            runner: macos-latest
            rust_targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
            tauri_target: 'universal-apple-darwin'
            bundle_args: '--bundles app,dmg'
            asset_suffix: 'macos-universal'

          # Linux x64 binary only (packaged as portable tar.gz)
          - id: linux-x64
            runner: ubuntu-24.04
            rust_targets: 'x86_64-unknown-linux-gnu'
            tauri_target: 'x86_64-unknown-linux-gnu'
            asset_suffix: 'linux-x64'

          # Linux ARM64 binary only
          - id: linux-arm64
            runner: ubuntu-24.04-arm
            rust_targets: 'aarch64-unknown-linux-gnu'
            tauri_target: 'aarch64-unknown-linux-gnu'
            asset_suffix: 'linux-arm64'

          # Windows is build
          - id: windows-x64
            runner: windows-latest
            rust_targets: 'x86_64-pc-windows-msvc'
            tauri_target: 'x86_64-pc-windows-msvc'
            bundle_args: '--bundles nsis'
            asset_suffix: 'windows-x64'

          # ARM64 Windows build
          - id: windows-arm64
            runner: windows-11-arm
            rust_targets: 'aarch64-pc-windows-msvc'
            tauri_target: 'aarch64-pc-windows-msvc'
            bundle_args: '--bundles nsis'
            asset_suffix: 'windows-arm64'

          # Android build (APK + AAB)
          - id: android
            runner: ubuntu-24.04
            rust_targets: 'aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android'
            asset_suffix: 'android'

          # iOS build
          - id: ios
            runner: macos-latest
            rust_targets: 'aarch64-apple-ios'
            asset_suffix: 'ios'

    steps:
      # Pull source
      - name: Checkout
        uses: actions/checkout@v4

      # Use cache on GitHub runners, skipped in local ACT runs
      - name: Setup Node with Yarn cache
        if: ${{ !env.ACT }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn

      - name: Setup Node without cache
        if: ${{ env.ACT }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Use same yarn version everywhere
      - name: Enable Corepack
        shell: bash
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate
          yarn --version

      # Install the Rust targets needed for each matrix job
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      # Rust artifacts cache
      - name: Rust cache
        if: ${{ !env.ACT }}
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      # Install Linux deps
      - name: Install Linux dependencies
        if: ${{ startsWith(matrix.id, 'linux-') }}
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libasound2-dev \
            libfreetype-dev \
            libfontconfig-dev \
            patchelf \
            xdg-utils \
            gnupg

      # Install JS deps
      - name: Install JS dependencies
        shell: bash
        run: |
          yarn install --frozen-lockfile

      # macOS signing and notarization
      - name: Build macOS bundles
        if: ${{ matrix.id == 'macos-universal' }}
        shell: bash
        env:
          CI: 'true'
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_SIGNING_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_SIGNING_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          yarn tauri build \
            --target "${{ matrix.tauri_target }}" \
            ${{ matrix.bundle_args }} \
            --ci

      # Linux binary build (no AppImage/deb/rpm bundles)
      - name: Build Linux binary
        if: ${{ startsWith(matrix.id, 'linux-') }}
        shell: bash
        env:
          CI: 'true'
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          yarn tauri build \
            --target "${{ matrix.tauri_target }}" \
            --ci

      # Windows build (unsigned - signing done by OSSign workflow)
      - name: Build Windows bundles
        if: ${{ startsWith(matrix.id, 'windows-') }}
        shell: bash
        env:
          CI: 'true'
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          yarn tauri build \
            --target "${{ matrix.tauri_target }}" \
            ${{ matrix.bundle_args }} \
            --ci

      # Dispatch Windows signing to OSSign workflow
      - name: Dispatch Windows signing
        if: ${{ startsWith(matrix.id, 'windows-') }}
        uses: ossign/actions/workflow/dispatch@main
        id: dispatch
        with:
          username: beaver-notes
          token: ${{ secrets.SIGNING_TOKEN }}

      - name: Parse signed artifacts
        if: ${{ startsWith(matrix.id, 'windows-') }}
        shell: bash
        run: |
          printf "%s" "${{ steps.dispatch.outputs.signed_artifacts }}" > artifacts.json
          echo "parsed=$(cat artifacts.json)" >> "$GITHUB_OUTPUT"

      - name: Download signed artifacts
        if: ${{ startsWith(matrix.id, 'windows-') }}
        shell: bash
        run: |
          mkdir -p signed
          for url in $(jq -r '.[].browser_download_url' artifacts.json); do
            echo "Downloading $url"
            curl -L -o "signed/$(basename "$url")" "$url"
          done

      # macOS release assets: DMG plus updater files
      - name: Stage macOS assets
        if: ${{ matrix.id == 'macos-universal' }}
        shell: bash
        run: |
          set -euo pipefail

          TARGET="${{ matrix.tauri_target }}"
          OUT="release-assets"
          mkdir -p "$OUT"

          find "src-tauri/target/${TARGET}/release/bundle" -type f \
            \( -name "*.dmg" -o -name "*.app.tar.gz" -o -name "*.sig" -o -name "latest.json" \) \
            -exec cp {} "$OUT"/ \;

      # Linux release assets: portable tarball and updater artifacts
      - name: Stage Linux assets
        if: ${{ startsWith(matrix.id, 'linux-') }}
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ needs.validate.outputs.version }}"
          TARGET="${{ matrix.tauri_target }}"
          OUT="release-assets"
          BIN_NAME="beaver-notes"
          BIN_PATH="src-tauri/target/${TARGET}/release/${BIN_NAME}"
          TAR_NAME="Beaver Notes-${VERSION}-${{ matrix.asset_suffix }}.tar.gz"

          mkdir -p "$OUT"

          cp "src-tauri/target/${TARGET}/release/bundle/latest.json" "$OUT/" 2>/dev/null || true

          find "src-tauri/target/${TARGET}/release/bundle" -type f -name "*.sig" -exec cp {} "$OUT"/ \; 2>/dev/null || true

          mkdir -p portable-root
          cp "$BIN_PATH" portable-root/
          tar -czf "$OUT/$TAR_NAME" -C portable-root .

      # Install cargo-tauri for Android/iOS builds
      - name: Install Tauri CLI
        if: ${{ matrix.id == 'android' || matrix.id == 'ios' }}
        shell: bash
        run: cargo install tauri-cli --version "^2"

      # Android build
      - name: Install Java
        if: ${{ matrix.id == 'android' }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Android SDK
        if: ${{ matrix.id == 'android' }}
        uses: android-actions/setup-android@v3

      - name: Setup Android keystore
        if: ${{ matrix.id == 'android' }}
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          if [ -n "${ANDROID_KEYSTORE_BASE64:-}" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/beaver-notes.jks"
            echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/beaver-notes.jks" >> "$GITHUB_ENV"
          fi

      - name: Regenerate Android project for CI
        if: ${{ matrix.id == 'android' }}
        shell: bash
        run: |
          rm -rf src-tauri/gen/android
          cargo tauri android init

      - name: Build Android app
        if: ${{ matrix.id == 'android' }}
        shell: bash
        env:
          CI: 'true'
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cargo tauri android build --apk --aab

      # iOS build
      - name: Regenerate iOS project
        if: ${{ matrix.id == 'ios' }}
        shell: bash
        run: |
          rm -rf src-tauri/gen/apple
          cargo tauri ios init

      - name: Configure iOS signing
        if: ${{ matrix.id == 'ios' }}
        shell: bash
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          PROJ="src-tauri/gen/apple/project.yml"
          sed -i '' "s/DEVELOPMENT_TEAM: .*/DEVELOPMENT_TEAM: ${APPLE_TEAM_ID}/" "$PROJ"

      - name: Setup iOS signing keychain
        if: ${{ matrix.id == 'ios' }}
        shell: bash
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.APPLE_IOS_SIGNING_CERTIFICATE_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_IOS_SIGNING_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail

          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$IOS_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" \
            -P "$IOS_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          rm -f "$CERT_PATH"

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Build iOS app
        if: ${{ matrix.id == 'ios' }}
        shell: bash
        env:
          CI: 'true'
        run: |
          cargo tauri ios build

      # Windows release assets: use signed artifacts from OSSign
      - name: Stage Windows assets
        if: ${{ startsWith(matrix.id, 'windows-') }}
        shell: bash
        run: |
          set -euo pipefail
          rm -rf release-assets
          mv signed release-assets

      # Android release assets: APK and AAB
      - name: Stage Android assets
        if: ${{ matrix.id == 'android' }}
        shell: bash
        run: |
          set -euo pipefail

          OUT="release-assets"
          mkdir -p "$OUT"

          find "src-tauri/gen/android/app/build/outputs" -type f \
            \( -name "*.apk" -o -name "*.aab" \) \
            -exec cp {} "$OUT"/ \;

      # iOS release assets
      - name: Stage iOS assets
        if: ${{ matrix.id == 'ios' }}
        shell: bash
        run: |
          set -euo pipefail

          OUT="release-assets"
          mkdir -p "$OUT"

          cp -R "src-tauri/gen/apple/build/beaver-notes_iOS.ipa" "$OUT/" 2>/dev/null || true

      # --- Store submission (uncomment when ready) ---

      # Upload Android AAB to Google Play Console
      # Requires: PLAY_SERVICE_ACCOUNT_JSON secret (Google Play service account key)
      #
      # - name: Upload to Google Play
      #   if: ${{ matrix.id == 'android' }}
      #   uses: r0adkll/upload-google-play@v1
      #   with:
      #     serviceAccountJson: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
      #     packageName: com.danielerolli.beaver_notes
      #     releaseFiles: src-tauri/gen/android/app/build/outputs/bundle/**/*.aab
      #     track: production
      #     status: completed

      # Upload iOS IPA to App Store Connect via Transporter
      # Requires: APPLE_ID + APPLE_ID_PASSWORD (app-specific password) secrets
      #
      # - name: Upload to App Store Connect
      #   if: ${{ matrix.id == 'ios' }}
      #   shell: bash
      #   env:
      #     APPLE_ID: ${{ secrets.APPLE_ID }}
      #     APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
      #   run: |
      #     xcrun transporter --upload \
      #       -f "src-tauri/gen/apple/build/beaver-notes_iOS.ipa" \
      #       -u "$APPLE_ID" \
      #       -p "$APPLE_ID_PASSWORD"

      # Ship each platform's files to the publish job
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.id }}
          path: release-assets/*
          if-no-files-found: error

  publish:
    name: Upload to draft release
    if: ${{ needs.validate.outputs.version_match == 'true' }}
    needs:
      - validate
      - create-release
      - desktop
    runs-on: ubuntu-latest

    steps:
      # Gather all artifacts from every build job
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts
          merge-multiple: true

      # Helpful when checking exactly what made it into the draft release
      - name: Inspect downloaded artifacts
        shell: bash
        run: |
          set -euo pipefail
          ls -R dist-artifacts

      # Attach files to the existing draft release (created earlier by create-release)
      - name: Upload files to draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate.outputs.tag_name }}
          draft: true
          prerelease: false
          files: dist-artifacts/*
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.CUSTOM_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
