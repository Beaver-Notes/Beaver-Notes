name: PR Tests

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: pr-tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            webkit2gtk-driver \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            patchelf \
            xvfb

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Install tauri-driver
        run: cargo install tauri-driver --locked

      - name: Run Linux desktop smoke tests
        env:
          TAURI_WEBVIEW_AUTOMATION: "true"
          TAURI_NATIVE_DRIVER_PATH: /usr/bin/WebKitWebDriver
          XDG_CONFIG_HOME: ${{ runner.temp }}/beaver-notes-xdg/config
          XDG_DATA_HOME: ${{ runner.temp }}/beaver-notes-xdg/data
          XDG_CACHE_HOME: ${{ runner.temp }}/beaver-notes-xdg/cache
        run: |
          rm -rf "$XDG_CONFIG_HOME" "$XDG_DATA_HOME" "$XDG_CACHE_HOME"
          mkdir -p "$XDG_CONFIG_HOME" "$XDG_DATA_HOME" "$XDG_CACHE_HOME"
          xvfb-run -a yarn test:desktop

      - name: Upload desktop test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-test-artifacts
          path: |
            test-results
          if-no-files-found: ignore
