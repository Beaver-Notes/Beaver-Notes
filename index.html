<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="script-src 'self' blob:"
    />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no"
    />
    <meta name="theme-color" content="#fafafa" />

    <meta name="referrer" content="no-referrer" />
    <script>
      (function() {
        var t = localStorage.getItem('theme');
        if (t === 'dark') {
          document.documentElement.classList.add('dark');
        } else if (t === 'system' || !t) {
          if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.add('dark');
          }
        }
      })();
    </script>
    <title>Beaver Notes</title>
  </head>
  <body>
    <div id="app" class="dark:border-gray-700"></div>

    <!-- Include external JavaScript file -->
    <script src="./src/utils/direction.js" type="module" defer></script>
    <script src="./src/index.js" type="module"></script>
  </body>
</html>
